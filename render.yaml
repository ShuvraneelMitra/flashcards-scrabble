services:
  - type: web
    name: tribble
    env: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: AUTH_PORT
        value: 10000
      - key: CLIENT_ORIGIN
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: REACT_APP_GOOGLE_CLIENT_ID
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: DATA_DIR
        value: /var/data
    disk:
      name: tribble-data
      mountPath: /var/data
      sizeGB: 1
